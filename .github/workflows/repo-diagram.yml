name: Generate Repo Diagram

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * 1" # Mondays 15:00 UTC (~7am PT)

permissions:
  contents: write

jobs:
  diagram:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate tree + mermaid
        run: |
          mkdir -p docs

          echo "# Repository Tree" > docs/REPO_TREE.md
          echo "" >> docs/REPO_TREE.md
          echo "Generated: $(date -u +"%Y-%m-%d %H:%M UTC")" >> docs/REPO_TREE.md
          echo "" >> docs/REPO_TREE.md
          echo "\`\`\`" >> docs/REPO_TREE.md
          # Tree without common junk
          sudo apt-get update -y
          sudo apt-get install -y tree
          tree -a -I ".git|node_modules|dist|build|out|.next|.cache|.venv|venv|__pycache__|.DS_Store" >> docs/REPO_TREE.md
          echo "\`\`\`" >> docs/REPO_TREE.md

          # Mermaid diagram: directories as nodes, edges = containment
          python3 .github/scripts/make_repo_mermaid.py

      - name: Commit changes (if any)
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/REPO_TREE.md docs/repo-diagram.mmd
          git commit -m "chore: auto-update repo diagram"
          git push
