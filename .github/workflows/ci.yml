name: CI
 
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
 
permissions:
  contents: read
 
jobs:
  lint-and-audit:
    name: Lint & Audit
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        uses: actions/checkout@v6
 
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
 
      - name: Install dependencies
        run: npm ci
 
      - name: Lint (ESLint)
        run: ./node_modules/.bin/eslint . --ext .js --max-warnings=0
 
      - name: Dependency audit
        run: npm audit --audit-level=moderate
