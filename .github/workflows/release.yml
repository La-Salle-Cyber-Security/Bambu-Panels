name: Build & Release

on:
  push:
    tags:
      - "v*"
      - "V*"

permissions:
  contents: write

env:
  GO2RTC_REPO: AlexxIT/go2rtc
  GO2RTC_TAG: latest
  GH_TOKEN: ${{ github.token }}

jobs:
  create-release-and-sources:
    name: Create Release + source bundles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (optional, safe to keep)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run tests (non-blocking)
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          set +e
          npm test --if-present
          status=$?
          set -e
          if [ $status -ne 0 ]; then
            echo "Tests failed or not configured (exit $status). Continuing anyway."
          fi

      - name: Create source tar.gz
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          tar --exclude=".git" \
              --exclude="node_modules" \
              --exclude=".DS_Store" \
              --exclude="dist" \
              --exclude="pkgroot" \
              --exclude="bundle" \
              -czf "dist/bambu-panels-${VERSION}-source.tar.gz" .

      - name: Create source zip
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          zip -r "dist/bambu-panels-${VERSION}-source.zip" . \
            -x ".git/*" "node_modules/*" ".DS_Store" "dist/*" "pkgroot/*" "bundle/*"

      - name: Create GitHub Release + upload source bundles (auto notes)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/bambu-panels-*-source.tar.gz
            dist/bambu-panels-*-source.zip

  macos-pkg:
    name: macOS .pkg (arm64 + amd64) with go2rtc
    runs-on: macos-latest
    needs: create-release-and-sources
    strategy:
      matrix:
        arch: [arm64, amd64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch go2rtc for macOS ${{ matrix.arch }}
        run: |
          mkdir -p bin
          # Regex may need a one-time tweak depending on go2rtc asset naming.
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            RX="go2rtc.*(mac|darwin).*arm64|go2rtc.*arm64.*(mac|darwin)"
          else
            RX="go2rtc.*(mac|darwin).*(amd64|x86_64)|go2rtc.*(amd64|x86_64).*(mac|darwin)"
          fi

          python3 scripts/fetch_go2rtc.py "${GO2RTC_REPO}" "${GO2RTC_TAG}" "${RX}" "bin/go2rtc"

      - name: Build .pkg
        run: |
          VERSION="${GITHUB_REF_NAME}"

          rm -rf pkgroot
          mkdir -p pkgroot/Applications/Bambu-Panels

          rsync -a . pkgroot/Applications/Bambu-Panels/ \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".DS_Store" \
            --exclude "pkgroot" \
            --exclude "dist" \
            --exclude "bundle"

          mkdir -p pkgroot/Applications/Bambu-Panels/bin
          cp bin/go2rtc pkgroot/Applications/Bambu-Panels/bin/go2rtc
          chmod +x pkgroot/Applications/Bambu-Panels/bin/go2rtc

          pkgbuild \
            --root pkgroot \
            --identifier com.yourname.bambu-panels \
            --version "${VERSION#v}" \
            "bambu-panels-${VERSION}-macos-${{ matrix.arch }}.pkg"

      - name: Upload .pkg to Release
        uses: softprops/action-gh-release@v2
        with:
          files: bambu-panels-*-macos-*.pkg

  linux-bundle:
    name: Linux tar.gz (amd64) with go2rtc
    runs-on: ubuntu-latest
    needs: create-release-and-sources
    strategy:
      matrix:
        arch: [amd64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch go2rtc for Linux ${{ matrix.arch }}
        run: |
          mkdir -p bin
          RX="go2rtc.*linux.*(amd64|x86_64)|go2rtc.*(amd64|x86_64).*linux"
          python3 scripts/fetch_go2rtc.py "${GO2RTC_REPO}" "${GO2RTC_TAG}" "${RX}" "bin/go2rtc"

      - name: Package Linux bundle
        run: |
          VERSION="${GITHUB_REF_NAME}"
          rm -rf bundle dist
          mkdir -p bundle/bin dist

          rsync -a . bundle/ \
            --exclude ".git" \
            --exclude "node_modules" \
            --exclude ".DS_Store" \
            --exclude "dist" \
            --exclude "pkgroot" \
            --exclude "bundle"

          cp bin/go2rtc bundle/bin/go2rtc
          chmod +x bundle/bin/go2rtc

          tar -czf "dist/bambu-panels-${VERSION}-linux-${{ matrix.arch }}.tar.gz" -C bundle .

      - name: Upload Linux bundle
        uses: softprops/action-gh-release@v2
        with:
          files: dist/bambu-panels-*-linux-*.tar.gz

  windows-bundle:
    name: Windows zip (amd64) with go2rtc
    runs-on: windows-latest
    needs: create-release-and-sources
    strategy:
      matrix:
        arch: [amd64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch go2rtc for Windows amd64 (win64.zip)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null

          # go2rtc uses win64.zip naming
          $rx = "go2rtc_win64\.zip"
          python scripts/fetch_go2rtc.py $env:GO2RTC_REPO $env:GO2RTC_TAG $rx "bin\go2rtc_win64.zip"

          # Extract zip and locate the exe
          Expand-Archive -Path "bin\go2rtc_win64.zip" -DestinationPath "bin\go2rtc_extracted" -Force

          $exe = Get-ChildItem -Path "bin\go2rtc_extracted" -Recurse -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { throw "Could not find .exe inside go2rtc_win64.zip" }

          Copy-Item $exe.FullName "bin\go2rtc.exe" -Force

      - name: Package Windows bundle
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}"

          Remove-Item -Recurse -Force bundle, dist -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path bundle\bin, dist | Out-Null

          # Copy repo into bundle, excluding junk
          robocopy . bundle /E /XD .git node_modules dist pkgroot bundle /XF .DS_Store | Out-Null
          $rc = $LASTEXITCODE

          # Robocopy exit codes 0-7 are success. 8+ is failure.
          if ($rc -ge 8) {
            Write-Error "robocopy failed with exit code $rc"
            exit $rc
          } else {
            Write-Host "robocopy succeeded with exit code $rc (treated as success)"
          }

          Copy-Item bin\go2rtc.exe bundle\bin\go2rtc.exe -Force

          Compress-Archive -Path bundle\* -DestinationPath "dist\bambu-panels-$version-windows-amd64.zip" -Force

      - name: Upload Windows bundle
        uses: softprops/action-gh-release@v2
        with:
          files: dist/bambu-panels-*-windows-amd64.zip
